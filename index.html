<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H7 Gallery - Red Edition Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #0a0a0a, #1a0f0f, #0f0f1a, #000000);
            --header-bg: rgba(17, 17, 17, 0.85);
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --border-color: #333;
            --menu-bg: #1a1a1a;
            --primary-red: #ff4757;
            --accent-glow: rgba(255, 71, 87, 0.3);
        }

        .light-mode {
            --bg-gradient: linear-gradient(-45deg, #f5f5f5, #ffffff, #e0e0e0, #f9f9f9);
            --header-bg: rgba(255, 255, 255, 0.9);
            --text-color: #1a1a1a;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --menu-bg: #ffffff;
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: var(--text-color); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 0.5s ease;
            scroll-behavior: smooth;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 1001; }
        #progress-bar { height: 100%; width: 0%; background: var(--primary-red); box-shadow: 0 0 15px var(--primary-red); transition: width 0.2s; }
        
        header { 
            background-color: var(--header-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
        }

        .logo { position: absolute; left: 50%; transform: translateX(-50%); font-size: 28px; font-weight: 900; color: var(--primary-red); letter-spacing: 2px; }
        .logo span { color: var(--text-color); }

        .dots-btn {
            background: none; border: 1.5px solid var(--primary-red); color: var(--primary-red);
            cursor: pointer; font-size: 20px; width: 38px; height: 38px;
            border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }

        .dropdown-menu {
            display: none; position: absolute; top: 55px; left: 0;
            background: var(--menu-bg); border: 1px solid var(--border-color);
            border-radius: 12px; min-width: 170px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden;
        }
        .dropdown-menu.show { display: block; animation: fadeIn 0.3s ease; }

        .menu-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; transition: 0.2s; color: var(--text-color); }
        .menu-item:hover { background: var(--primary-red); color: white; }

        .social-links { display: flex; gap: 12px; align-items: center; }
        .social-links svg { width: 24px; height: 24px; fill: var(--primary-red); transition: 0.4s; }
        .social-links a:hover svg { fill: var(--text-color); transform: scale(1.2); }

        h1 { 
            margin-top: 40px; font-size: 2.8rem; font-weight: 800; 
            background: linear-gradient(to right, #fff, var(--primary-red));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .gallery { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; padding: 30px; max-width: 1200px; margin: 0 auto; width: 90%;
        }

        .image-card {
            background: var(--card-bg); border-radius: 20px; padding: 12px;
            border: 1px solid var(--glass-border); transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            opacity: 0; transform: translateY(40px); backdrop-filter: blur(5px);
        }
        .image-card.reveal { opacity: 1; transform: translateY(0); }
        .image-card:hover { border-color: var(--primary-red); transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        
        .img-container { width: 100%; height: 260px; overflow: hidden; border-radius: 15px; margin-bottom: 15px; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: 0.6s; }
        .image-card:hover img { transform: scale(1.08); }

        .download-btn {
            background: linear-gradient(135deg, var(--primary-red), #ff6b81);
            color: white; padding: 10px 25px; border-radius: 12px; cursor: pointer; 
            transition: 0.3s; font-weight: bold; text-decoration: none; display: inline-block;
            box-shadow: 0 4px 15px var(--accent-glow); border: none;
        }

        #backToTop {
            position: fixed; bottom: 25px; right: 25px; width: 45px; height: 45px;
            background: var(--primary-red); color: white; border: none; border-radius: 12px;
            cursor: pointer; display: none; z-index: 1000; font-size: 18px;
        }

        /* تعديلات الجوال */
        @media (max-width: 600px) {
            .gallery { gap: 15px; padding: 15px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
            h1 { font-size: 2rem; margin-top: 25px; }
            .logo { font-size: 24px; }
            .social-links { gap: 10px; }
            .social-links svg { width: 22px; height: 22px; }
        }

        .modal {
            display: none; position: fixed; z-index: 2000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); justify-content: center; align-items: center;
        }
        .modal img { max-width: 92%; max-height: 85%; border-radius: 12px; }

        footer { padding: 40px 20px; border-top: 1px solid var(--border-color); margin-top: auto; color: #888; font-size: 13px; }
        footer span { color: var(--primary-red); font-weight: bold; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-red); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <header>
        <div class="menu-wrapper">
            <button class="dots-btn" onclick="toggleMenu()">☰</button>
            <div id="dropdown" class="dropdown-menu">
                <div class="menu-item" id="theme-toggle">
                    <span id="theme-text">Dark Mode</span> 🌙
                </div>
            </div>
        </div>
        <div class="logo">H<span>7</span></div>

        </div>
    </header>

    <h1>Gallery</h1>
    <div class="gallery" id="gallery"></div>

    <button id="backToTop" onclick="scrollToTop()">↑</button>

    <div id="myModal" class="modal" onclick="this.style.display='none'">
        <img id="imgFull" src="">
    </div>

    <footer><p>All Rights Reserved &copy; 2026 for <span>H7 Gallery</span></p></footer>

    <script>
        const imagesData = [
            { id: 1, url: 'IMGP8824.JPG' },
            { id: 2, url: 'IMGP8821.JPG' },
            { id: 3, url: 'https://picsum.photos' },
            { id: 4, url: 'https://picsum.photos' },
            { id: 5, url: 'https://picsum.photos' },
            { id: 6, url: 'https://picsum.photos' }
        ];

        function toggleMenu() { document.getElementById("dropdown").classList.toggle("show"); }

        function display() {
            const gallery = document.getElementById('gallery');
            imagesData.forEach((img, index) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.style.transitionDelay = `${index * 0.05}s`; 
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${img.url}" loading="lazy" onclick="openModal('${img.url}')" alt="Gallery Image">
                    </div>
                    <a href="${img.url}" download class="download-btn">⬇ Download</a>`;
                gallery.appendChild(card);
            });
            setTimeout(revealOnScroll, 50);
        }

        function revealOnScroll() {
            const cards = document.querySelectorAll('.image-card');
            cards.forEach(card => {
                const cardTop = card.getBoundingClientRect().top;
                if (cardTop < window.innerHeight - 30) card.classList.add('reveal');
            });
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        window.onscroll = () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
            document.getElementById("backToTop").style.display = (winScroll > 300) ? "block" : "none";
            revealOnScroll();
        };

        document.getElementById('theme-toggle').onclick = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-text').innerText = isLight ? "Light Mode" : "Dark Mode";
        };

        function openModal(src) { 
            document.getElementById("imgFull").src = src; 
            document.getElementById("myModal").style.display = "flex"; 
        }

        window.onclick = (e) => { if (!e.target.matches('.dots-btn')) document.getElementById("dropdown").classList.remove('show'); }

        display();
    </script>
</body>
</html>
