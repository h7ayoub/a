<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H7 Gallery - Interaction Red Edition</title>
    <style>
        /* تعريف متغيرات الألوان للوضع الداكن والفاتح */
        :root {
            --bg-gradient: linear-gradient(-45deg, #0a0a0a, #1a0f0f, #0f0f1a, #000000);
            --header-bg: rgba(17, 17, 17, 0.8);
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: #333;
            --input-bg: #111;
            --menu-bg: #1a1a1a;
        }

        .light-mode {
            --bg-gradient: linear-gradient(-45deg, #f5f5f5, #ffffff, #e0e0e0, #f9f9f9);
            --header-bg: rgba(255, 255, 255, 0.9);
            --text-color: #1a1a1a;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --input-bg: #f0f0f0;
            --menu-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: var(--text-color); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: 0.5s ease;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        header { 
            background-color: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* الشعار في المنتصف */
        .logo { 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(24px, 5vw, 32px); 
            font-weight: bold; 
            color: #ff4757; 
        }
        .logo span { color: #fff; }
        .light-mode .logo span { color: #000; }

        /* القائمة الجانبية (ثلاث نقاط) */
        .menu-wrapper { position: relative; z-index: 101; }
        .dots-btn {
            background: none; border: 1px solid #ff4757; color: #ff4757;
            cursor: pointer; font-size: 22px; width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .dropdown-menu {
            display: none; position: absolute; top: 45px; right: 0;
            background: var(--menu-bg); border: 1px solid var(--border-color);
            border-radius: 10px; min-width: 160px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        html[dir="ltr"] .dropdown-menu { right: auto; left: 0; }
        .dropdown-menu.show { display: block; }
        .menu-item {
            padding: 12px 15px; cursor: pointer; color: var(--text-color);
            border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: rgba(255, 71, 87, 0.1); }

        .social-links { display: flex; gap: 15px; z-index: 101; }
        .social-links svg { width: 25px; height: 25px; fill: #ff4757; transition: 0.3s; }
        .social-links a:hover svg { fill: var(--text-color); transform: scale(1.1); }

        .gallery { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; 
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            width: 90%;
        }

        .image-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid var(--border-color);
            transition: 0.3s;
        }

        .image-card:hover { border-color: #ff4757; }
        .image-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; cursor: pointer; }

        .interaction-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 5px;
        }

        .like-btn {
            background: none;
            border: 1px solid #ff4757;
            color: #ff4757;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .like-btn.active { background: #ff4757; color: white; }

        .comment-section { margin-top: 15px; text-align: right; }
        .comment-input-area { display: flex; gap: 5px; margin-bottom: 10px; }
        .comment-input-area input { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px; border-radius: 5px; outline: none; }
        .comment-input-area button { background: #ff4757; border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .comments-list { max-height: 100px; overflow-y: auto; font-size: 0.9rem; color: #ccc; background: rgba(0,0,0,0.3); border-radius: 5px; }
        .comment-item { padding: 8px 10px; border-bottom: 1px solid #222; }

        footer {
            background-color: var(--header-bg);
            color: #777;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            margin-top: 20px;
        }
        footer span { color: #ff4757; font-weight: bold; }

        .modal {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }
        .modal img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="menu-wrapper">
            <button class="dots-btn" onclick="toggleMenu()">⋮</button>
            <div id="dropdown" class="dropdown-menu">
                <div class="menu-item" id="theme-toggle">
                    <span id="theme-text">الوضع الليلي</span> 🌙
                </div>
                <div class="menu-item" id="lang-toggle">
                    <span id="lang-text">English</span> 🌐
                </div>
            </div>
        </div>

        <div class="logo">H<span>7</span></div>

        <div class="social-links">
            <a href="https://instagram.com/h7_ayoub" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z""")/>></svg>

                <svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.9-.39-2.81-.12-.79.24-1.5.71-1.97 1.35-.45.62-.7 1.37-.73 2.14.01.69.23 1.4.64 1.95.49.69 1.25 1.16 2.05 1.29.85.15 1.73-.01 2.45-.48.63-.41 1.08-1.05 1.3-1.75.16-.54.19-1.11.18-1.67.01-5.32-.02-10.64.03-15.96z""")/>></svg>
            </a>
        </div>
    </header>

    <h1 id="main-title">معرض الصور التفاعلي</h1>
    
    <div class="gallery" id="gallery"></div>

    <div id="myModal" class="modal" onclick="this.style.display='none'">
        <img id="imgFull" src="">
    </div>

    <footer>
        <p id="footer-p">جميع الحقوق محفوظة &copy; 2026 لـ <span>H7 Gallery</span></p>
    </footer>

    <script>
        const texts = {
            ar: { title: "معرض الصور التفاعلي", footer: "جميع الحقوق محفوظة &copy; 2026 لـ <span>H7 Gallery</span>", like: "إعجاب", theme: "الوضع الليلي", lang: "English", placeholder: "اكتب تعليقاً...", post: "نشر" },
            en: { title: "Interactive Photo Gallery", footer: "All Rights Reserved &copy; 2026 for <span>H7 Gallery</span>", like: "Like", theme: "Dark Mode", lang: "العربية", placeholder: "Write a comment...", post: "Post" }
        };

        let currentLang = 'ar';

        function toggleMenu() { document.getElementById("dropdown").classList.toggle("show"); }

        window.onclick = (event) => {
            if (!event.target.matches('.dots-btn')) {
                document.getElementById("dropdown").classList.remove("show");
            }
        }

        const imagesData = [
            { id: 1, url: 'WhatsApp Image 2026-03-10 at 04.04.34 (1).jpeg', likes: 0 },
            { id: 2, url: 'WhatsApp Image 2026-03-10 at 04.04.34.jpeg', likes: 0 },
            { id: 3, url: 'https://picsum.photos', likes: 0 },
            { id: 4, url: 'https://picsum.photos', likes: 0 }
        ];

        function display() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            imagesData.forEach(img => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img src="${img.url}" onclick="openModal('${img.url}')">
                    <div class="interaction-bar">
                        <button class="like-btn" onclick="toggleLike(this)">
                            ❤ ${texts[currentLang].like} (<span class="count">${img.likes}</span>)
                        </button>
                        <span style="font-size: 12px; color: #555;">#${img.id}</span>
                    </div>
                    <div class="comment-section">
                        <div class="comment-input-area">
                            <input type="text" placeholder="${texts[currentLang].placeholder}" id="input-${img.id}">
                            <button onclick="addComment(${img.id})">${texts[currentLang].post}</button>
                        </div>
                        <div class="comments-list" id="comments-${img.id}"></div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        function toggleLike(btn) {
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);
            if (btn.classList.contains('active')) {
                btn.classList.remove('active'); countSpan.innerText = count - 1;
            } else {
                btn.classList.add('active'); countSpan.innerText = count + 1;
            }
        }

        function addComment(id) {
            const input = document.getElementById(`input-${id}`);
            const list = document.getElementById(`comments-${id}`);
            if (input.value.trim() !== "") {
                const newComment = document.createElement('div');
                newComment.className = 'comment-item';
                newComment.innerText = input.value;
                list.prepend(newComment); input.value = ""; 
            }
        }

        document.getElementById('lang-toggle').onclick = () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('main-title').innerText = texts[currentLang].title;
            document.getElementById('footer-p').innerHTML = texts[currentLang].footer;
            document.getElementById('lang-text').innerText = texts[currentLang].lang;
            document.getElementById('theme-text').innerText = texts[currentLang].theme;
            display();
        };

        document.getElementById('theme-toggle').onclick = () => {
            document.body.classList.toggle('light-mode');
        };

        function openModal(src) {
            document.getElementById("imgFull").src = src;
            document.getElementById("myModal").style.display = "flex";
        }

        display();
    </script>
</body>
</html>
