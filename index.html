<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H7 Gallery - Interaction Red Edition</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #0a0a0a, #1a0f0f, #0f0f1a, #000000);
            --header-bg: rgba(17, 17, 17, 0.8);
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: #333;
            --input-bg: #111;
            --menu-bg: #1a1a1a;
        }

        .light-mode {
            --bg-gradient: linear-gradient(-45deg, #f5f5f5, #ffffff, #e0e0e0, #f9f9f9);
            --header-bg: rgba(255, 255, 255, 0.9);
            --text-color: #1a1a1a;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --input-bg: #f0f0f0;
            --menu-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: var(--text-color); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: 0.5s ease;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        header { 
            background-color: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(24px, 5vw, 32px); 
            font-weight: bold; 
            color: #ff4757; 
        }
        .logo span { color: #fff; }
        .light-mode .logo span { color: #000; }

        .menu-wrapper { position: relative; z-index: 101; }
        .dots-btn {
            background: none; border: 1px solid #ff4757; color: #ff4757;
            cursor: pointer; font-size: 22px; width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .dropdown-menu {
            display: none; position: absolute; top: 45px; left: 0;
            background: var(--menu-bg); border: 1px solid var(--border-color);
            border-radius: 10px; min-width: 160px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .dropdown-menu.show { display: block; }
        .menu-item {
            padding: 12px 15px; cursor: pointer; color: var(--text-color);
            border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: rgba(255, 71, 87, 0.1); }

        .social-links { display: flex; gap: 15px; z-index: 101; }
        .social-links a { text-decoration: none; transition: 0.3s; }
        .social-links svg { width: 25px; height: 25px; fill: #ff4757; }
        .social-links a:hover svg { fill: var(--text-color); transform: scale(1.1); }

        .gallery { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; 
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            width: 90%;
        }

        .image-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid var(--border-color);
            transition: 0.3s;
        }

        .image-card:hover { border-color: #ff4757; }
        .image-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; cursor: pointer; }

        .interaction-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 5px;
        }

        .btn-group { display: flex; gap: 8px; }

        .like-btn, .download-btn {
            background: none;
            border: 1px solid #ff4757;
            color: #ff4757;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            font-size: 13px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .like-btn.active { background: #ff4757; color: white; }
        .download-btn:hover { background: #ff4757; color: white; }

        .comment-section { margin-top: 15px; text-align: left; }
        .comment-input-area { display: flex; gap: 5px; margin-bottom: 10px; }
        .comment-input-area input { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px; border-radius: 5px; outline: none; }
        .comment-input-area button { background: #ff4757; border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .comments-list { max-height: 100px; overflow-y: auto; font-size: 0.9rem; color: #ccc; background: rgba(0,0,0,0.3); border-radius: 5px; }
        .comment-item { padding: 8px 10px; border-bottom: 1px solid #222; }

        footer {
            background-color: var(--header-bg);
            color: #777;
            padding: 25px 20px;
            border-top: 1px solid var(--border-color);
            margin-top: 20px;
        }
        footer span { color: #ff4757; font-weight: bold; }

        .modal {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }
        .modal img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

            <div id="dropdown" class="dropdown-menu">
                <div class="menu-item" id="theme-toggle">
                    <span id="theme-text">Dark Mode</span> 🌙
                </div>
            </div>
        </div>

        <div class="logo">H<span>7</span></div>

        <div class="social-links">

            </a>
        </div>
    </header>

    <h1 id="main-title" style="margin-top: 30px;">Gallery</h1>
    <div class="gallery" id="gallery"></div>

    <div id="myModal" class="modal" onclick="this.style.display='none'">
        <img id="imgFull" src="">
    </div>

    <footer>
        <p id="footer-p">All Rights Reserved &copy; 2026 for <span>H7 Gallery</span></p>
    </footer>

    <script>
        const labels = {
            like: "Like",
            download: "Download",
            placeholder: "Write a comment...",
            post: "Post",
            dark: "Dark Mode",
            light: "Light Mode"
        };

        const imagesData = [
            { id: 1, url: 'WhatsApp Image 2026-03-10 at 04.04.34 (1).jpeg', likes: 0 },
            { id: 2, url: 'WhatsApp Image 2026-03-10 at 04.04.34.jpeg', likes: 0 },
            { id: 3, url: 'https://picsum.photos', likes: 0 },
            { id: 4, url: 'https://picsum.photos', likes: 0 }
        ];

        function toggleMenu() { document.getElementById("dropdown").classList.toggle("show"); }

        function display() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            imagesData.forEach(img => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img src="${img.url}" onclick="openModal('${img.url}')">
                    <div class="interaction-bar">
                        <div class="btn-group">
                            <button class="like-btn" onclick="toggleLike(this)">
                                ❤ ${labels.like} (<span class="count">${img.likes}</span>)
                            </button>
                            <a href="${img.url}" download="Image-${img.id}.jpg" class="download-btn">
                                ⬇ ${labels.download}
                            </a>
                        </div>
                        <span style="font-size: 12px; color: #555;">#${img.id}</span>
                    </div>
                    <div class="comment-section">
                        <div class="comment-input-area">
                            <input type="text" placeholder="${labels.placeholder}" id="input-${img.id}">
                            <button onclick="addComment(${img.id})">${labels.post}</button>
                        </div>
                        <div class="comments-list" id="comments-${img.id}"></div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        function toggleLike(btn) {
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);
            if (btn.classList.contains('active')) {
                btn.classList.remove('active'); countSpan.innerText = count - 1;
            } else {
                btn.classList.add('active'); countSpan.innerText = count + 1;
            }
        }

        function addComment(id) {
            const input = document.getElementById(`input-${id}`);
            const list = document.getElementById(`comments-${id}`);
            if (input.value.trim() !== "") {
                const newComment = document.createElement('div');
                newComment.className = 'comment-item';
                newComment.innerText = input.value;
                list.prepend(newComment); input.value = ""; 
            }
        }

        document.getElementById('theme-toggle').onclick = () => {
            document.body.classList.toggle('light-mode');
            const themeText = document.getElementById('theme-text');
            themeText.innerText = document.body.classList.contains('light-mode') ? labels.light : labels.dark;
        };

        function openModal(src) {
            document.getElementById("imgFull").src = src;
            document.getElementById("myModal").style.display = "flex";
        }

        display();
    </script>
</body>
</html>
